<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>functions-kv 管理</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #d9dee7;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 26px;
        font-weight: 650;
      }

      section {
        margin-top: 16px;
        padding: 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--text);
        background: #fff;
        font: inherit;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        color: #fff;
        background: var(--primary);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button.secondary {
        color: var(--text);
        background: #eef2f7;
      }

      button.secondary:hover {
        background: #e3e8f0;
      }

      button.danger {
        background: var(--danger);
      }

      button.danger:hover {
        background: var(--danger-hover);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .status {
        margin-top: 14px;
        color: var(--muted);
        min-height: 23px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 760px);
          margin: 20px auto;
        }

        section {
          padding: 16px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>functions-kv 管理</h1>

      <section id="authPanel">
        <form id="authForm" autocomplete="on">
          <input type="text" name="username" value="functions-kv" autocomplete="username" class="hidden">
          <label for="authInput">访问 key</label>
          <input id="authInput" name="password" type="password" autocomplete="current-password" placeholder="输入 FUNCTIONS_KV_AUTH">
          <div class="row">
            <button id="unlockButton" type="submit">解锁</button>
            <button id="forgetButton" class="secondary" type="button">清除Cookie</button>
          </div>
        </form>
        <div id="authStatus" class="status"></div>
      </section>

      <section id="kvPanel" class="hidden">
        <label for="keyInput">KV key</label>
        <input id="keyInput" autocomplete="off">

        <label for="valueInput">值</label>
        <textarea id="valueInput" spellcheck="false"></textarea>

        <div class="row">
          <button id="loadButton" type="button">读取</button>
          <button id="saveButton" type="button">保存</button>
          <button id="deleteButton" class="danger" type="button">删除</button>
        </div>
        <div id="kvStatus" class="status"></div>
      </section>
    </main>

    <script>
      const authPanel = document.querySelector("#authPanel");
      const kvPanel = document.querySelector("#kvPanel");
      const authInput = document.querySelector("#authInput");
      const keyInput = document.querySelector("#keyInput");
      const valueInput = document.querySelector("#valueInput");
      const authStatus = document.querySelector("#authStatus");
      const kvStatus = document.querySelector("#kvStatus");
      const buttons = [...document.querySelectorAll("button")];
      const AUTH_STORAGE_KEY = "functions-kv-auth";

      function normalizeAuth(value) {
        const auth = value.trim();
        if (!auth) return "";
        return auth.includes("=") ? auth : "__Host-Auth=" + auth;
      }

      function setAuthCookie(value) {
        const cookie = normalizeAuth(value);
        if (!cookie) return false;
        document.cookie = cookie + "; Path=/; Secure; SameSite=Strict; Max-Age=2592000";
        return true;
      }

      function clearAuthCookie() {
        document.cookie = "__Host-Auth=; Path=/; Secure; SameSite=Strict; Max-Age=0";
      }

      function saveAuth(value) {
        const auth = value.trim();
        if (auth) localStorage.setItem(AUTH_STORAGE_KEY, auth);
      }

      function loadAuth() {
        authInput.value = localStorage.getItem(AUTH_STORAGE_KEY) || "";
      }

      function forgetAuth() {
        localStorage.removeItem(AUTH_STORAGE_KEY);
        authInput.value = "";
        clearAuthCookie();
        setLocked("已忘记本机保存的访问 key");
      }

      function endpoint() {
        const key = keyInput.value.trim();
        if (!key) throw new Error("请先输入 KV key");
        return "/" + encodeURIComponent(key);
      }

      async function checkAuth() {
        const response = await fetch("/__functions_kv_auth_check__", {
          method: "GET",
          credentials: "same-origin",
        });
        if (response.status === 403) {
          clearAuthCookie();
          return false;
        }
        return true;
      }

      function setLocked(message) {
        kvPanel.classList.add("hidden");
        authPanel.classList.remove("hidden");
        authStatus.textContent = message || "未解锁";
      }

      function setUnlocked(message) {
        authPanel.classList.add("hidden");
        kvPanel.classList.remove("hidden");
        kvStatus.textContent = message || "";
        keyInput.focus();
      }

      function setBusy(busy) {
        for (const button of buttons) button.disabled = busy;
      }

      async function request(method, body) {
        const options = { method, credentials: "same-origin" };
        if (body != null) options.body = body;
        const response = await fetch(endpoint(), options);
        if (response.status === 403) {
          clearAuthCookie();
          setLocked("访问 key 无效或已过期");
          throw new Error("Forbidden");
        }
        return response;
      }

      async function loadValue() {
        const response = await request("GET");
        if (response.status === 404) {
          valueInput.value = "";
          kvStatus.textContent = "这个 key 还没有值，保存后会创建。";
          return;
        }
        if (!response.ok) throw new Error(await response.text() || "读取失败");
        valueInput.value = await response.text();
        const version = response.headers.get("X-KV-Version");
        kvStatus.textContent = version ? "已读取，版本：" + version : "已读取";
      }

      async function saveValue() {
        const response = await request("POST", valueInput.value);
        if (!response.ok) throw new Error(await response.text() || "保存失败");
        const version = response.headers.get("X-KV-Version");
        kvStatus.textContent = version ? "已保存，版本：" + version : "已保存";
      }

      async function deleteValue() {
        if (!confirm("确定删除这个 key 的值？")) return;
        const response = await request("DELETE");
        if (!response.ok) throw new Error(await response.text() || "删除失败");
        valueInput.value = "";
        kvStatus.textContent = "已删除";
      }

      async function run(action, statusEl) {
        setBusy(true);
        try {
          await action();
        } catch (error) {
          if (error.message !== "Forbidden") {
            statusEl.textContent = error.message || "操作失败";
          }
        } finally {
          setBusy(false);
        }
      }

      document.querySelector("#authForm").addEventListener("submit", (event) => {
        event.preventDefault();
        run(async () => {
          if (!setAuthCookie(authInput.value)) throw new Error("请输入访问 key");
          if (!(await checkAuth())) throw new Error("访问 key 无效");
          saveAuth(authInput.value);
          setUnlocked("已解锁，请输入 KV key 后读取或保存。");
        }, authStatus);
      });

      document.querySelector("#loadButton").addEventListener("click", () => run(loadValue, kvStatus));
      document.querySelector("#saveButton").addEventListener("click", () => run(saveValue, kvStatus));
      document.querySelector("#deleteButton").addEventListener("click", () => run(deleteValue, kvStatus));

      document.querySelector("#forgetButton").addEventListener("click", forgetAuth);

      keyInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") document.querySelector("#loadButton").click();
      });

      loadAuth();
      checkAuth().then((ok) => {
        if (ok) {
          setUnlocked("");
          return;
        }
        if (authInput.value) authStatus.textContent = "已填入本机保存的访问 key，点击解锁后验证。";
      });
    </script>
  </body>
</html>
